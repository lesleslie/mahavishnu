# Prometheus configuration for MCP ecosystem monitoring
global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'mcp-ecosystem'
    environment: 'production'

# Alertmanager configuration (for future use)
alerting:
  alertmanagers:
    - static_configs:
        - targets:
          # TODO: Add alertmanager when implemented
          # - alertmanager:9093

# Rule files (for future use)
rule_files:
  # - "alert_rules.yml"

# Scrape configurations for verified targets
scrape_configs:
  # ========================================
  # Verified Bodai services
  # Backed by monitoring/file_sd/verified_metrics_targets.yml
  # Refresh with:
  # uv run python scripts/verify_ecosystem_metrics.py \
  #   --write-verified-file monitoring/file_sd/verified_metrics_targets.yml
  # ========================================
  - job_name: 'ecosystem-services'
    file_sd_configs:
      - files:
          - /etc/prometheus/file_sd/verified_metrics_targets.yml
    scrape_interval: 10s
    scrape_timeout: 5s

  # ========================================
  # Planned ecosystem targets
  # Candidate inventory lives in monitoring/ecosystem_metrics_inventory.yml.
  # Services move onto the scrape surface only after local verification.
  # ========================================
  # Candidate services:
  # - session-buddy
  # - akosha
  # - dhara
  # - crackerjack

  # ========================================
  # OpenTelemetry Collector - Prometheus Exporter
  # ========================================
  - job_name: 'otel-collector'
    static_configs:
      - targets: ['otel-collector:8889']
    scrape_interval: 15s

  # ========================================
  # Prometheus Self-Monitoring
  # ========================================
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

# ========================================
# Storage Configuration
# ========================================
storage:
  tsdb:
    path: /prometheus
    retention:
      time: 15d
      size: 50GB
