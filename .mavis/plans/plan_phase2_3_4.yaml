  - id: akosha-fitness-analyzer
    title: 'Akosha Fitness Analyzer — bounded buffer + DLQ'
    prompt: |
      在 `/Users/les/Projects/akosha/akosha/processing/fitness_analyzer.py` 创建 `FitnessAnalyzer`。

      **背景**：
      - Fitness Analyzer 是周期性后台任务（默认60秒间隔）
      - 从各 Bodai 组件轮询 traces，计算 rolling failure_rate 和 p99 latency
      - 写入 Dhara key：`routing_fitness/{task_class}/{selector}`
      - 有界内存 buffer + DLQ（3次重试后写DLQ）

      **核心数据结构**：
      ```python
      # Dhara value schema
      {
        "score": float,           # 1 - failure_rate (higher = better)
        "samples": int,           # routing decisions in window
        "failure_rate": float,    # fraction where outcome=error
        "p99_latency_ms": float, # 99th percentile duration
        "updated_at": str,        # ISO8601 timestamp
        "window_start": str,      # start of rolling window
        "component_count": int    # how many components contributed
      }
      ```

      **计算逻辑**：
      1. 从 BodaiComponentMCPClient 轮询所有组件的 traces
      2. 按 (task_class, selector) 分组
      3. 对每组计算：
         - failure_rate = errors / total
         - score = 1 - failure_rate
         - p99 = numpy.percentile(durations, 99) if durations else 0
      4. 写入 Dhara（使用 circuit breaker 保护）
      5. 如果 Dhara 不可用，写入有界 buffer（deque, maxlen=1000），3次重试后DLQ

      **bounded buffer + DLQ**：
      ```python
      from collections import deque
      from pathlib import Path

      _buffer: deque[dict] = deque(maxlen=1000)  # in-memory buffer
      _dlq_path = Path("/tmp/fitness_dlq.jsonl")  # DLQ file

      def _write_with_retry(fitness_data: dict) -> bool:
          # try: dhara set()
          # except: buffer.append(), retry 3 times
          # after 3 fails: write to DLQ file
          pass
      ```

      **配置**：
      - `window_minutes`: rolling window 大小（默认 60）
      - `poll_interval_seconds`: 轮询间隔（默认 60）
      - `min_samples`: 最少样本数才写入（默认 5）

      **Dhara circuit breaker**：
      - 使用 `akosha/resilience/circuit_breaker.py` 的 CircuitBreaker
      - fallback: buffer + DLQ

      **Periodic job**：
      ```python
      class FitnessAnalyzer:
          async def start(self) -> None:
              # 启动定期轮询任务
              pass

          async def run_analysis(self) -> None:
              # 单次分析运行
              pass
      ```

      **新 MCP 工具**：`run_fitness_analysis`（手动触发）
      - 注册到 Akosha MCP server
      - 调用 `analyzer.run_analysis()`

      **代码规范**：
      - 类型注解完整
      - async/await 正确使用
      - 符合 Akosha 代码风格
      - 日志记录分析结果统计

      完成后报告：文件路径、核心类/方法、数据流描述。
    assigned_to: developer
