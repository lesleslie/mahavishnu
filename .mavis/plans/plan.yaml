  max_concurrency: 10
  max_consecutive_failures: 2
  max_cycles: 12
tasks:
  - id: session-buddy-otel
    title: 'Session-Buddy query_local_traces 工具'
    prompt: |
      在 Session-Buddy 中添加 `query_local_traces` MCP tool。

      目标文件: /Users/les/Projects/session-buddy/session_buddy/mcp/tools/memory/otel_trace_tools.py (新建)

      参考已完成的 Akosha 版本: /Users/les/Projects/akosha/akosha/mcp/tools/otel_tools.py
      参考 Session-Buddy 现有 tool 注册模式: /Users/les/Projects/session-buddy/session_buddy/mcp/tools/memory/akosha_tools.py

      Session-Buddy 使用 FastMCP 直接注册（不通过 FastMCPToolRegistry），
      函数签名: def register_otel_trace_tools(mcp_server: Any) -> None
      mcp_server.tool()(query_local_traces)

      HotStore 在 Session-Buddy 的位置: from session_buddy.storage.hot_store_akosha import HotStoreAkosha
      （如果该路径不存在，先 grep 找正确的 HotStore 导入路径）

      query_local_traces 参数:
        - system_id: str
        - start_time: str | None
        - end_time: str | None  
        - task_class: str | None
        - limit: int = 100

      实现: 使用 HotStore search_similar(query_embedding=[0.0]*384, system_id=system_id, limit=limit, threshold=0.0) 获取结果，
      然后在 Python 中按 JSON attributes 过滤（HNSW 索引不用于此查询）。

      注册到 mcp/server.py 的 _TOOL_FUNCTIONS 映射（如果存在），或添加到对应的 __init__.py。

      完成后验证语法: cd /Users/les/Projects/session-buddy && .venv/bin/python3 -c "from session_buddy.mcp.tools.memory.otel_trace_tools import register_otel_trace_tools; print('OK')"
    assigned_to: general
    verified_by: verifier
    verify_prompt: |
      读取 /Users/les/Projects/session-buddy/session_buddy/mcp/tools/memory/otel_trace_tools.py
      确认:
      1. register_otel_trace_tools(mcp_server) 函数存在
      2. query_local_traces 工具函数存在且参数正确
      3. 使用 HotStore search_similar 且 threshold=0
      4. 工具注册到 MCP server

      然后运行验证命令:
      cd /Users/les/Projects/session-buddy && .venv/bin/python3 -c "from session_buddy.mcp.tools.memory.otel_trace_tools import register_otel_trace_tools; print('OK')"
      确认输出为 OK
    timeout_ms: 600000

  - id: crackerjack-otel
