# Mahavishnu - LLM Model Configuration
# Updated: 2026-05-16 (three-tier provider chain: minimax → llama_server → ollama)
#
# Provider chain:
#   1. minimax  - MiniMax M3 (primary cloud, API key required)
#   2. llama_server - llama.cpp server with qwen3.5 (local, no auth)
#   3. ollama   - Ollama with qwen2.5-coder (local fallback, no auth)
#
# Related files:
#   - mahavishnu/workers/ollama.py        - OllamaWorker implementation
#   - mahavishnu/engines/agno_adapter_impl.py - Agno LLMProviderFactory
#   - config/bifrost/config.template.json - Bifrost gateway config

# =============================================================================
# CLOUD PROVIDERS
# =============================================================================

# MiniMax - Primary cloud provider (API key required)
# Updated: 2026-06-02 - M3 is now primary (M2.7 retained as fallback)
minimax:
  enabled: true
  require_auth: true
  api_key_env: "MINIMAX_API_KEY"
  base_url: "https://api.minimax.io/v1"
  api_key: "${MINIMAX_API_KEY}"
  priority: 1
  timeout: 30
  max_retries: 2
  task_routing:
    CODE_GENERATION: "MiniMax-M3"
    CODE_REVIEW: "MiniMax-M3"
    DEBUGGING: "MiniMax-M3"
    REFACTORING: "MiniMax-M3"
    TESTING: "MiniMax-M3"
    REASONING: "MiniMax-M3"
    ANALYSIS: "MiniMax-M3"
    DOCUMENTATION: "MiniMax-M3"
    SWARM: "MiniMax-M3-highspeed"
    QUICK: "MiniMax-M3-highspeed"
    AGENT_LOOP: "MiniMax-M3-highspeed"
    CREATIVE: "MiniMax-M3-highspeed"
    GENERAL: "MiniMax-M3-highspeed"
    VISION: "MiniMax-M3"
    ML_INFERENCE: "MiniMax-M3"
    # M2.7 fallback mappings for backward compatibility
    FALLBACK: "MiniMax-M2.7"
    FALLBACK_HIGHSPEED: "MiniMax-M2.7-highspeed"

# =============================================================================
# LOCAL PROVIDERS (no auth required, always available when running)
# =============================================================================

# llama-server (llama.cpp) - Secondary local provider with qwen3.5
llama_server:
  enabled: true
  require_auth: false
  base_url: "http://localhost:8081"
  priority: 2
  timeout: 60
  max_retries: 2
  task_routing:
    CODE_GENERATION: "qwen3.5"
    CODE_REVIEW: "qwen3.5"
    DEBUGGING: "qwen3.5"
    REFACTORING: "qwen3.5"
    TESTING: "qwen3.5"
    REASONING: "qwen3.5"
    GENERAL: "qwen3.5"
    ANALYSIS: "qwen3.5"
    DOCUMENTATION: "qwen3.5"
    SWARM: "qwen3.5"
    QUICK: "qwen3.5"
    ML_INFERENCE: "qwen3.5"
    AGENT_LOOP: "qwen3.5"

# Ollama - Tertiary local fallback with qwen2.5-coder
ollama:
  enabled: true
  require_auth: false
  base_url: "http://localhost:11434"
  priority: 3
  timeout: 120
  max_retries: 1
  task_routing:
    CODE_GENERATION: "qwen2.5-coder:7b"
    CODE_REVIEW: "qwen2.5-coder:7b"
    DEBUGGING: "qwen2.5-coder:7b"
    REFACTORING: "qwen2.5-coder:7b"
    DOCUMENTATION: "qwen2.5-coder:7b"
    TESTING: "qwen2.5-coder:7b"
    REASONING: "qwen2.5-coder:7b"
    CREATIVE: "qwen2.5-coder:7b"
    ANALYSIS: "qwen2.5-coder:7b"
    GENERAL: "qwen2.5-coder:7b"
    QUICK: "qwen2.5-coder:7b"
    EMBEDDING: "nomic-embed-text"
    ML_INFERENCE: "qwen2.5-coder:7b"

# =============================================================================
# OPTIONAL PROVIDERS
# =============================================================================

# Bifrost gateway (activated via env vars only)
bifrost:
  enabled: false
  base_url: "http://127.0.0.1:8471"
  activate_env: "BIFROST_BASE_URL"

# =============================================================================
# DEFAULTS
# =============================================================================

default_provider: "minimax"
fallback_chain: ["minimax", "llama_server", "ollama"]
