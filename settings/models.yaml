# Mahavishnu - LLM Model Configuration
# Updated: 2026-04-13 (LLM Provider Reconfiguration v2)
#
# ZAI GLM models are the primary cloud provider via coding plan subscription.
# Ollama remains the local fallback. Bifrost is optional (activated via env vars).
#
# Related files:
#   - mahavishnu/workers/ollama.py        - OllamaWorker implementation
#   - mahavishnu/engines/agno_adapter_impl.py - Agno LLMProviderFactory
#   - config/bifrost/config.template.json - Bifrost gateway config

# =============================================================================
# CLOUD PROVIDERS (priority order)
# =============================================================================

# ZAI - Primary cloud provider (coding plan subscription)
zai:
  enabled: true
  base_url: "https://api.z.ai/api/coding/paas/v4"
  api_key: "${ZAI_API_KEY}"
  priority: 1
  timeout: 30
  max_retries: 2
  task_routing:
    CODE_GENERATION: "glm-4.7"
    CODE_REVIEW: "glm-4.7"
    DEBUGGING: "glm-4.7"
    REFACTORING: "glm-4.7"
    TESTING: "glm-4.7"
    REASONING: "glm-5.1"
    GENERAL: "glm-4.5"
    ANALYSIS: "glm-4.5"
    DOCUMENTATION: "glm-4.5-air"
    SWARM: "glm-4.5-air"
    SWARM_FREE: "glm-4.7-flash"
    VISION: "GLM-4.5V"
    QUICK: "glm-4.5-air"
  fallback:
    subscription_exhausted: "glm-4.7-flash"

# =============================================================================
# LOCAL PROVIDER
# =============================================================================

ollama:
  enabled: true
  base_url: "http://localhost:11434"
  priority: 2
  task_routing:
    CODE_GENERATION: "qwen2.5-coder:7b"
    CODE_REVIEW: "qwen2.5-coder:7b"
    DEBUGGING: "qwen2.5-coder:7b"
    REFACTORING: "qwen2.5-coder:7b"
    DOCUMENTATION: "qwen2.5-coder:7b"
    TESTING: "qwen2.5-coder:7b"
    REASONING: "llama3:8b"
    CREATIVE: "llava:7b"
    ANALYSIS: "qwen2.5-coder:7b"
    VISION: "llava:7b"
    EMBEDDING: "nomic-embed-text"
    GENERAL: "qwen2.5-coder:7b"

# =============================================================================
# OPTIONAL PROVIDERS
# =============================================================================

# Bifrost gateway (activated via env vars only)
bifrost:
  enabled: false
  base_url: "http://127.0.0.1:8471"
  activate_env: "BIFROST_BASE_URL"

# Qwen (Alibaba Cloud) - future provider
qwen:
  enabled: false
  base_url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
  api_key: "${QWEN_API_KEY}"
  task_routing:
    CODE_GENERATION: "qwen-coder-plus"
    GENERAL: "qwen-plus"

# =============================================================================
# DEFAULTS
# =============================================================================

default_provider: "zai"
fallback_chain: ["zai", "ollama"]
free_tier_provider: "zai-free"
