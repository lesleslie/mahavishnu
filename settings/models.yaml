# Mahavishnu - LLM Model Configuration
# Updated: 2026-05-10 (MiniMax provider migration, phase M1)
#
# MiniMax M2.7 models are the primary cloud provider via the public MiniMax API.
# Ollama remains the local fallback. Bifrost is optional (activated via env vars).
#
# Related files:
#   - mahavishnu/workers/ollama.py        - OllamaWorker implementation
#   - mahavishnu/engines/agno_adapter_impl.py - Agno LLMProviderFactory
#   - config/bifrost/config.template.json - Bifrost gateway config

# =============================================================================
# CLOUD PROVIDERS (priority order)
# =============================================================================

# MiniMax - Primary cloud provider
minimax:
  enabled: true
  base_url: "https://api.minimax.io/v1"
  api_key: "${MINIMAX_API_KEY}"
  priority: 1
  timeout: 30
  max_retries: 2
  task_routing:
    CODE_GENERATION: "MiniMax-M2.7"
    CODE_REVIEW: "MiniMax-M2.7"
    DEBUGGING: "MiniMax-M2.7"
    REFACTORING: "MiniMax-M2.7"
    TESTING: "MiniMax-M2.7"
    REASONING: "MiniMax-M2.7"
    GENERAL: "MiniMax-M2.7"
    ANALYSIS: "MiniMax-M2.7"
    DOCUMENTATION: "MiniMax-M2.7"
    SWARM: "MiniMax-M2.7-highspeed"
    SWARM_FREE: "MiniMax-M2.7-highspeed"
    VISION: "MiniMax-M2.7"
    QUICK: "MiniMax-M2.7-highspeed"
  fallback:
    subscription_exhausted: "MiniMax-M2.7-highspeed"

# =============================================================================
# LOCAL PROVIDER
# =============================================================================

ollama:
  enabled: true
  base_url: "http://localhost:11434"  # llama-server (llama.cpp)
  priority: 2
  task_routing:
    CODE_GENERATION: "Qwen3-8B-8.2B-Q4_K_M"
    CODE_REVIEW: "Qwen3-8B-8.2B-Q4_K_M"
    DEBUGGING: "Qwen3-8B-8.2B-Q4_K_M"
    REFACTORING: "Qwen3-8B-8.2B-Q4_K_M"
    DOCUMENTATION: "Qwen3-8B-8.2B-Q4_K_M"
    TESTING: "Qwen3-8B-8.2B-Q4_K_M"
    REASONING: "Qwen3-8B-8.2B-Q4_K_M"
    CREATIVE: "Qwen3-8B-8.2B-Q4_K_M"
    ANALYSIS: "Qwen3-8B-8.2B-Q4_K_M"
    VISION: "Qwen3-8B-8.2B-Q4_K_M"
    EMBEDDING: "nomic-embed-text"
    GENERAL: "Qwen3-8B-8.2B-Q4_K_M"

# =============================================================================
# OPTIONAL PROVIDERS
# =============================================================================

# Bifrost gateway (activated via env vars only)
bifrost:
  enabled: false
  base_url: "http://127.0.0.1:8471"
  activate_env: "BIFROST_BASE_URL"

# =============================================================================
# DEFAULTS
# =============================================================================

default_provider: "minimax"
fallback_chain: ["minimax", "ollama"]
free_tier_provider: "minimax"
