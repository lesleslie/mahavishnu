# Ollama configuration for Mahavishnu workers
ollama:
  base_url: "http://localhost:11434"

  # Task routing used by OllamaWorker (mahavishnu/workers/ollama.py)
  # This maps task categories to specific models
  task_routing:
    CODE_GENERATION: "qwen2.5-coder:7b"
    CODE_REVIEW: "qwen2.5-coder:7b"
    DEBUGGING: "qwen2.5-coder:7b"
    REFACTORING: "qwen2.5-coder:7b"
    DOCUMENTATION: "qwen2.5-coder:7b"
    TESTING: "qwen2.5-coder:7b"
    REASONING: "llama3:8b"
    CREATIVE: "llava:7b"
    ANALYSIS: "qwen2.5-coder:7b"
    VISION: "llava:7b"
    EMBEDDING: "nomic-embed-text"
    GENERAL: "qwen2.5-coder:7b"

