# Mahavishnu Configuration with Terminal Management and OpenSearch Integration
#
# Related config files:
#   - settings/models.yaml     - LLM model registry (Ollama, embeddings, cloud)
#   - settings/embeddings.yaml - Detailed embedding configuration
#   - settings/ecosystem.yaml  - Repository manifest
#   - settings/repos.yaml      - Repository metadata

# Server settings
server_name: "Mahavishnu Orchestrator"
cache_root: .oneiric_cache
health_ttl_seconds: 60.0

# Logging
log_level: INFO

# Repository manifest path
repos_path: settings/ecosystem.yaml

# LLM model registry path
models_path: settings/models.yaml

# Concurrency settings
max_concurrent_workflows: 10

# Adapter configuration
adapters:
  prefect_enabled: true  # High-level orchestration with dynamic flows
  llamaindex_enabled: true  # RAG pipelines for ingesting repos/docs (re-enabled 2026-02-23)
  agno_enabled: true  # Fast, scalable single/multi-agents with memory and tools

# LLM configuration for LlamaIndex and Agno
llm:
  model: nomic-embed-text  # Ollama embedding model
  ollama_base_url: http://localhost:11434  # Ollama API endpoint

# OpenSearch configuration for vector storage and observability
opensearch:
  endpoint: https://localhost:9200  # HTTPS endpoint for security
  index_name: mahavishnu_code
  verify_certs: true
  ca_certs: null  # Path to CA certificate file if using self-signed certs
  use_ssl: true
  ssl_assert_hostname: true
  ssl_show_warn: true

# OpenTelemetry trace storage with semantic search
otel_storage:
  enabled: false  # Set to true to enable PostgreSQL + pgvector storage
  connection_string: ""  # Set via MAHAVISHNU_OTEL_STORAGE__CONNECTION_STRING environment variable
  embedding_model: "all-MiniLM-L6-v2"  # Sentence transformer model
  embedding_dimension: 384  # Vector dimension (match model)
  cache_size: 1000  # Max embeddings in memory cache
  similarity_threshold: 0.85  # Min similarity for search (0.0-1.0)
  batch_size: 100  # Traces per batch write
  batch_interval_seconds: 5  # Seconds between batch flushes
  max_retries: 3  # Retry attempts for failed operations
  circuit_breaker_threshold: 5  # Failures before circuit breaker opens

# OpenTelemetry trace ingester with Akosha HotStore (DuckDB)
otel_ingester:
  enabled: false  # Set to true to enable OTel ingester
  hot_store_path: ":memory:"  # DuckDB database path (':memory:' for in-memory)
  embedding_model: "all-MiniLM-L6-v2"  # Sentence transformer model
  cache_size: 1000  # Max embeddings in memory cache
  similarity_threshold: 0.7  # Min similarity for search (0.0-1.0)

# Pool management for multi-pool orchestration
pools:
  enabled: true  # Enable pool management
  default_type: "mahavishnu"  # Default pool type (mahavishnu, session-buddy, kubernetes)
  routing_strategy: "least_loaded"  # Pool selection (round_robin, least_loaded, random, affinity)
  min_workers: 1  # Default minimum workers per pool
  max_workers: 10  # Default maximum workers per pool
  memory_aggregation_enabled: true  # Enable memory aggregation across pools
  memory_sync_interval: 60  # Memory sync interval in seconds (10-600)
  session_buddy_url: "http://localhost:8678/mcp"  # Session-Buddy MCP server URL for delegated pools
  akosha_url: "http://localhost:8682/mcp"  # Akosha MCP server URL for cross-pool analytics

# Worker orchestration for headless AI execution
workers:
  enabled: true  # Enable worker orchestration
  max_concurrent: 10  # Maximum concurrent workers (1-100)
  default_type: "terminal-qwen"  # Default worker type (terminal-qwen, terminal-claude, container-executor)
  timeout_seconds: 300  # Default worker timeout in seconds (30-3600)
  session_buddy_integration: true  # Enable Session-Buddy result storage for workers

# Quality control
qc:
  enabled: true
  min_score: 80
  checks:
    - linting
    - type_checking
    - security_scan

# Session management
session:
  enabled: true
  checkpoint_interval: 60  # Checkpoint interval in seconds (10-600)

# Resilience configuration
resilience:
  retry_max_attempts: 3  # Maximum retry attempts (1-10)
  retry_base_delay: 1.0  # Base retry delay in seconds (0.1-60)
  circuit_breaker_threshold: 5  # Consecutive failures before circuit opens (1-100)
  timeout_per_repo: 300  # Timeout per repo in seconds (30-3600)

# Observability configuration
observability:
  metrics_enabled: true  # Enable OpenTelemetry metrics
  tracing_enabled: true  # Enable distributed tracing
  otlp_endpoint: "http://localhost:4317"  # OTLP endpoint for metrics/traces

# Authentication settings
auth:
  enabled: false  # Set to true in production
  algorithm: "HS256"
  expire_minutes: 60
  # Set MAHAVISHNU_AUTH__SECRET environment variable with at least 32 characters

# Subscription-based authentication (e.g., Claude Code)
subscription_auth:
  enabled: false
  algorithm: "HS256"
  expire_minutes: 60
  # Set MAHAVISHNU_SUBSCRIPTION_AUTH__SECRET environment variable

# Session-Buddy polling integration
session_buddy_polling:
  enabled: false  # Set to true to enable polling
  endpoint: "http://localhost:8678/mcp"  # Session-Buddy MCP server URL
  interval_seconds: 30  # Polling interval (5-600)
  timeout_seconds: 10  # HTTP timeout for MCP calls (1-60)
  max_retries: 3  # Maximum retry attempts (1-10)
  retry_delay_seconds: 5  # Base retry delay (1-60)
  circuit_breaker_threshold: 5  # Failures before circuit opens (1-20)
  metrics_to_collect:  # MCP tools to poll
    - get_activity_summary
    - get_workflow_metrics
    - get_session_analytics
    - get_performance_metrics

# Terminal management
terminal:
  enabled: true  # Enable terminal management for pool workers
  default_columns: 120
  default_rows: 40
  capture_lines: 100
  poll_interval: 0.5
  max_concurrent_sessions: 20
  # Adapter preference: "auto" (detect iTerm2, fallback to mcpretentious),
  # "iterm2" (native iTerm2 Python API), or "mcpretentious" (PTY-based)
  adapter_preference: "auto"

# Embedding configuration with security and caching
embeddings:
  provider: "auto"  # auto, fastembed, ollama, openai
  model: "BAAI/bge-small-en-v1.5"  # Default model for FastEmbed
  dimension: 384  # Vector dimension

  # Cache configuration
  cache:
    l1_max_size: 10000  # In-memory LRU cache size
    l2_enabled: true  # Enable Redis L2 cache
    l2_redis_url: "redis://localhost:6379/0"  # Use rediss:// for TLS
    l2_tls_enabled: false  # Set true in production
    l2_tls_verify: true  # Verify TLS certificate
    l2_auth_enabled: false  # Enable Redis AUTH
    l2_auth_username: ""  # Redis username (set via env var)
    l2_ttl_seconds: 86400  # 24 hours TTL

  # Rate limiting and DoS protection
  rate_limit:
    enabled: true
    max_batch_size: 100  # Maximum texts per batch
    max_text_length: 100000  # 100KB max text length
    max_concurrent: 5  # Max concurrent embedding requests
    timeout_seconds: 60.0  # Request timeout

  # Budget tracking (optional)
  budget:
    enabled: false
    daily_limit: 1000000  # Max embeddings per day
    alert_threshold: 0.8  # Alert at 80% of limit

# Adapter Registry Configuration (Hybrid Plugin Architecture)
adapter_registry:
  enabled: true  # Enable hybrid adapter registry with dynamic discovery
  allowlist_patterns:
    - "mahavishnu.adapters.*"  # Core adapters
    - "mahavishnu.engines.*"   # Engine adapters (prefect, agno)
  verify_signatures: false  # Enable in production for security
  reject_unsigned: false  # Dev mode: accept unsigned adapters
  cache_ttl_seconds: 300  # Resolution cache TTL
  discovery_timeout_seconds: 30  # Timeout for adapter discovery

# Oneiric MCP integration for remote adapter discovery
oneiric_mcp:
  enabled: false  # Enable gRPC discovery from Oneiric MCP server
  grpc_host: "localhost"
  grpc_port: 8681
  use_tls: false  # Enable TLS in production
  cache_ttl_sec: 300  # Adapter metadata cache TTL

# Feature flags for hybrid registry
feature_flags:
  use_hybrid_registry: true  # Use HybridAdapterRegistry instead of hardcoded
  use_capability_routing: true  # Use CapabilityRouter for task routing
  fallback_to_legacy: true  # Fall back to legacy initialization on failure

# Goal-Driven Teams configuration
goal_teams:
  enabled: true  # Master switch for Goal-Driven Teams feature
  goal_parsing:
    min_length: 10  # Minimum goal length in characters
    max_length: 2000  # Maximum goal length in characters
    fallback_strategy: "simple"  # Fallback when goal parsing fails (simple, reject, default_team)
  limits:
    max_teams_per_user: 10  # Maximum active teams per user
    team_ttl_hours: 24  # Team time-to-live in hours (0 for no expiry)
    max_concurrent_executions: 5  # Maximum concurrent team executions
  feature_flags:
    # Core feature flags
    mcp_tools_enabled: true  # Enable MCP tools for goal-driven teams
    cli_commands_enabled: true  # Enable CLI commands for goal-driven teams
    # Advanced feature flags
    llm_fallback_enabled: true  # Enable LLM fallback for goal parsing
    websocket_broadcasts_enabled: true  # Enable WebSocket broadcasts for team events
    prometheus_metrics_enabled: true  # Enable Prometheus metrics for team monitoring
    # Experimental features
    learning_system_enabled: false  # Enable learning system (Phase 3)
    auto_mode_selection_enabled: true  # Enable automatic mode selection
    custom_skills_enabled: false  # Enable custom skills for team creation

# Health check configuration for dependency management
# Design: docs/plans/2026-02-27-health-check-system-design.md
#
# Environment variable overrides:
#   MAHAVISHNU_HEALTH__DEPENDENCIES__SESSION_BUDDY__HOST=remote-host
#   MAHAVISHNU_HEALTH__DEPENDENCIES__SESSION_BUDDY__PORT=443
#   MAHAVISHNU_HEALTH__DEPENDENCIES__SESSION_BUDDY__USE_TLS=true
health:
  enabled: true  # Enable health check system
  check_timeout_seconds: 5  # Timeout for individual health check requests
  retry_base_delay_seconds: 1.0  # Base delay for exponential backoff
  retry_max_delay_seconds: 16.0  # Maximum delay between retries
  # Service dependencies to check on startup
  dependencies:
    session_buddy:
      host: "localhost"  # Override via MAHAVISHNU_HEALTH__DEPENDENCIES__SESSION_BUDDY__HOST
      port: 8678
      required: true  # Block startup if unavailable
      timeout_seconds: 30
      use_tls: false
    akosha:
      host: "localhost"  # Override via MAHAVISHNU_HEALTH__DEPENDENCIES__AKOSHA__HOST
      port: 8682
      required: true  # Block startup if unavailable
      timeout_seconds: 30
      use_tls: false
    dhruva:
      host: "localhost"  # Override via MAHAVISHNU_HEALTH__DEPENDENCIES__DHRUVA__HOST
      port: 8683
      required: false  # Optional dependency - log warning if unavailable
      timeout_seconds: 10
      use_tls: false
    crackerjack:
      host: "localhost"  # Override via MAHAVISHNU_HEALTH__DEPENDENCIES__CRACKERJACK__HOST
      port: 8676
      required: false  # Optional - quality checks can run without it
      timeout_seconds: 10
      use_tls: false

