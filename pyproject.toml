[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["mahavishnu"]

[project]
name = "mahavishnu"
version = "0.6.4"
description = "Global orchestrator package for development workflows"
authors = [
    {name = "Your Name", email = "your.email@example.com"},
]
readme = "README.md"
license = {text = "MIT"}
requires-python = ">=3.13"
classifiers = [
    "Development Status :: 4 - Beta",
]
dependencies = [
    # CLI
    "typer>=0.20.1",
    # Oneiric ecosystem
    "oneiric>=0.3.12",
    # Shared infrastructure (mcp-common)
    # Condition 1: Add mcp-common dependency for code graph and messaging types
    "mcp-common[treesitter,llm]>=0.14.1",  # Tree-sitter + FallbackChain LLM routing
    # MCP server
    "fastmcp>=3.0.0b1",  # Compatible with crackerjack (pre-release for httpx compatibility)
    "uvicorn[standard]>=0.38.0",  # Websocket support for MCP
    # Configuration
    "pydantic>=2.12.5",
    "pyyaml>=6.0.3",
    "tomli>=2.2.1",
    "aiofiles>=25.1.0",  # Async file I/O for config loading (compatible with crackerjack)
    # XDG Base Directory compliance
    "platformdirs>=4.0.0",
    # Observability
    "opentelemetry-api>=1.38.0",
    "opentelemetry-sdk>=1.38.0",
    "opentelemetry-instrumentation>=0.59b0",
    "opentelemetry-exporter-otlp-proto-grpc>=1.38.0",
    # Prometheus metrics
    "prometheus-client>=0.21.0",
    "structlog>=25.5.0",
    # Rate limiting for webhooks and API endpoints
    "slowapi>=0.1.9",
    # OpenTelemetry trace storage with semantic search
    "asyncpg>=0.29.0",  # Async PostgreSQL driver for OTel trace storage
    "pgvector>=0.2.5",  # Vector similarity search for semantic trace search
    # Embeddings (cross-platform alternatives to sentence-transformers)
    # Note: fastembed uses ONNX Runtime. On macOS Intel + Python 3.13+, onnxruntime
    # has no compatible wheels (dropped x86_64 support in 1.20+, no cp313 wheels before).
    # On those platforms, embedding service falls back to Ollama or OpenAI.
    "fastembed>=0.2.0; sys_platform != 'darwin' or platform_machine != 'x86_64' or python_version < '3.13'",
    # Resilience
    "tenacity>=9.1.2",
    # Rate limiting & DDoS protection
    "starlette-context>=0.4.0",  # Request context for rate limiting
    # Quality control (optional)
    "crackerjack>=0.50.1",
    # Session management
    # Session-Buddy MCP: Development session tracking & quality metrics
    # Local-first privacy (ONNX embeddings, no external APIs)
    # See: docs/LIBRARY_EVALUATION_2025.md for memory system comparison
    "session-buddy>=0.13.0",
    # Git operations
    "gitpython>=3.1.46",
    # Async SQLite (for EventBus persistence)
    "aiosqlite>=0.20.0",
    # Encrypted SQLite (AES-256 encryption for sensitive data)
    # Uses cryptography.fernet (Python 3.13+ compatible, no C extensions)
    "cryptography>=44.0.0",
    # Terminal management
    "iterm2>=2.13",  # iTerm2 Python API (optional, for iTerm2 adapter)
    # Admin shell
    "ipython>=8.0.0",  # IPython admin shell for debugging and monitoring
    # =============================================================================
    # ADAPTER DEPENDENCIES (moved from optional-dependencies)
    # All compatible adapters with no version conflicts
    # =============================================================================
    # Prefect: High-level orchestration with dynamic flows
    "prefect>=3.6.13",
    # Cron schedule validation for Prefect deployment schedules
    "croniter>=3.0.4",
    # Agno: Fast, scalable single/multi-agents
    "agno>=0.1.7",
    # LlamaIndex: RAG pipelines for ingesting repos/docs
    "llama-index-core>=0.14.0,<0.15.0",
    "llama-index-embeddings-ollama>=0.8.0,<0.9.0",
    "llama-index-llms-ollama>=0.8.0,<0.9.0",
    "llama-index-vector-stores-opensearch>=0.6.0,<0.7.0",
    # Content ingestion: PDF, EPUB, web content
    "pypdf>=5.0.0",  # Fast, pure Python PDF library
    "beautifulsoup4>=4.12.0",  # HTML parsing for web scraping
    "httpx[http2]>=0.28.0",  # HTTP client with HTTP/2 support (compatible with fastmcp)
    "ebooklib>=0.18",  # EPUB processing
    # Use the slim package with only the providers Mahavishnu integrates.
    # This avoids the umbrella package's transitive huggingface extra path.
    "pydantic-ai-slim[mcp,openai,anthropic,google,groq]>=1.77.0",
    "llama-cpp-python>=0.3.20",
    # RunPod Flash: serverless GPU pool execution
    "runpod-flash~=1.7",
    # Secure XML parsing (prevents XXE/DTD attacks on coverage.xml etc.)
    "defusedxml>=0.7.1",
]

[project.scripts]
mahavishnu = "mahavishnu._main_cli:app"

# =============================================================================
# ADAPTER ENTRY POINTS - Plugin Discovery
# =============================================================================
# These entry points enable dynamic adapter discovery via the HybridAdapterRegistry.
# Adapters are discovered at runtime using Python's entry point mechanism.
# Security: Only adapters matching patterns in adapter_allowlist_patterns are loaded.
# =============================================================================

[project.entry-points."mahavishnu.adapters"]
prefect = "mahavishnu.engines.prefect_adapter:prefect_adapter_entries"
agno = "mahavishnu.engines.agno_adapter:agno_adapter_entries"
worker = "mahavishnu.core.adapters.worker:worker_adapter_entries"

# =============================================================================
# ORCHESTRATION ADAPTERS - Core Components
# =============================================================================
# Simplified Architecture (2025-2026):
#   - Prefect: High-level orchestration with dynamic flows
#   - LlamaIndex: RAG pipelines for ingesting repos/docs, embedding with Ollama
#   - Agno: Fast, scalable single/multi-agents with memory and tools
#   - Oneiric: Foundational package for config, logging, and pluggable adapters
#
# Removed (2025-01-23):
#   - Airflow: Legacy data pipelines (use Prefect instead)
#   - CrewAI: Multi-agent framework (use Agno instead)
#   - LangGraph: Stateful AI agent workflows (use Agno instead)
# =============================================================================

# CORE COMPONENTS (All enabled by default)
# =============================================================================

[project.optional-dependencies]
tui = [
    "textual>=0.40",
]
dev = [
    # Testing
    "pytest>=9.0.2",
    "pytest-asyncio>=1.3.0",
    "pytest-cov>=7.0.0",
    "pytest-xdist>=3.8.0",  # Parallel test execution
    "pytest-mock>=3.15.1",
    "hypothesis>=6.148.13",  # Property-based testing
    "pytest-timeout>=2.4.0",  # Test timeout protection
    "respx>=0.22.0",  # httpx request mocking for unit tests

    # Code quality
    "ruff>=0.14.14",  # Fast Python linter (replaces black/flake8/isort)
    "pyright>=1.1.408",  # Type checking fallback
    "pylint>=3.0.4",  # Additional linting perspectives
    # Note: We use Crackerjack for QC, not pre-commit

    # Security & dependency management
    "bandit>=1.9.3",  # Security linting
    "safety>=2.3.4",  # Dependency vulnerability scanning
    "creosote>=4.1.0",  # Detect unused dependencies
    "detect-secrets>=1.4.0",  # Secret scanning in code

    # Code modernization & complexity
    "refurb>=2.2.0",  # Modern Python suggestions
    "codespell>=2.4.1",  # Typo detection
    "complexipy>=5.1.0",  # Complexity checking

    # Documentation
    "zensical>=0.0.19",

    # Crackerjack integration
    "crackerjack>=0.50.1",
]

# All core components (simplified stack - adapters now in main dependencies)
all = [
    "mahavishnu[dev]",
]

# Core components (recommended - adapters now in main dependencies)
core = [
    "mahavishnu[dev]",
]

# RAG and knowledge base focus
rag = [
    "mahavishnu[dev]",
]

# Worker CLI profiles (meta-extras; install corresponding CLIs on host PATH)
worker-openclaw = []
worker-deepagents = []
worker-clai = []
worker-alt-cli = [
    "mahavishnu[worker-openclaw,worker-deepagents,worker-clai]",
]

# Desktop automation: macOS and cross-platform desktop automation
automation = [
    # macOS-only dependencies (platform marker required)
    "pyxa>=0.0.2; sys_platform == 'darwin'",           # macOS application automation (primary)
    "pyatomac>=2.0.7; sys_platform == 'darwin'",       # macOS accessibility API (deprioritized)
    # Cross-platform
    "pyautogui>=0.9.54",                               # Cross-platform automation fallback
    "Pillow>=10.0.0",                                  # Screenshot processing
    "mss>=9.0.0",                                      # Fast cross-platform screenshots
]

# Desktop automation with vision (OCR, image recognition)
automation-vision = [
    "mahavishnu[automation]",
    "pytesseract>=0.3.10",      # OCR via Tesseract
    "easyocr>=1.7.0",           # Alternative OCR (GPU optional)
    "opencv-python>=4.8.0",     # Computer vision
]

# Full automation suite (all optional features)
automation-full = [
    "mahavishnu[automation,automation-vision]",
]

# Hatchet workflow orchestration adapter
hatchet = [
    "hatchet-sdk>=1.0,<2",
]

[tool.hatch.metadata]
allow-direct-references = true

# Crackerjack Ruff Configuration (fast linter replacing black/isort/flake8)
[tool.ruff]
line-length = 100
target-version = "py313"

[tool.ruff.lint]
extend-select = [
    "I",   # Import sorting
    "N",   # PEP8 naming
    "UP",  # Pyupgrade
    "B",   # Bugbear
    "C4",  # Comprehensions
    "SIM", # Simplify
    "TCH", # Type checking
]
ignore = [
    "B904",   # raise-without-from-inside-except — each instance requires per-call judgment
    "N806",   # variable-in-function-should-be-lowercase — class-as-var pattern used intentionally
    "E402",   # module-level-import-not-at-top — intentional post-init imports in this codebase
    "SIM102", # collapsible-if — readability judgment; not a correctness issue
    "SIM105", # suppressible-exception — contextlib.suppress not always clearer
    "SIM108", # if-else-block-instead-of-ternary — readability judgment
]
exclude = [
    ".git",
    "__pycache__",
    ".venv",
    "build",
    "dist",
    ".eggs",
    "*.egg-info",
]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.ruff.lint.isort]
known-first-party = ["mahavishnu"]
force-sort-within-sections = true

# Ignore B008 (function calls in defaults) for CLI files using Typer pattern
[tool.ruff.lint.per-file-ignores]
"mahavishnu/**/*cli*.py" = ["B008"]
"mahavishnu/cli/**/*.py" = ["B008"]

[tool.ruff.lint.pycodestyle]
max-doc-length = 100

[tool.ruff.lint.pylint]
max-args = 10
max-branches = 15
max-returns = 6
max-statements = 55

# mypy configuration
[tool.mypy]
python_version = "3.13"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = true
disallow_uncomplete_defs = true
check_untyped_defs = true
no_implicit_optional = true
warn_redundant_casts = true
warn_unused_ignores = true
warn_no_return = true
follow_imports = "normal"
strict_optional = true

[[tool.mypy.overrides]]
module = "tests.*"
disallow_untyped_defs = false

# Crackerjack pytest configuration with extended markers
[tool.pytest]
minversion = "7.0"
asyncio_mode = "auto"
testpaths = ["tests"]
pythonpath = [".", "scripts"]
python_files = ["test_*.py"]
python_functions = ["test_*"]
python_classes = ["Test*"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "-ra",
    "--cov=mahavishnu",
    "--cov-report=term-missing:skip-covered",
    "--cov-report=html",
    "--cov-report=xml",
    "--cov-fail-under=80",
    "-n", "auto",  # Auto-detect parallel workers
]
markers = [
    "unit: Unit tests (fast, isolated)",
    "integration: Integration tests (slower, may use external services)",
    "e2e: End-to-end tests (slowest, full workflow)",
    "property: Property-based tests using Hypothesis",
    "slow: Mark test as slow (skip with -m 'not slow')",
    "timeout: Mark test with custom timeout duration",
    "ci: Tests that must pass in CI",
    "crackerjack: Tests that run in Crackerjack QC",
    "prefect: Tests for Prefect adapter",
    "llamaindex: Tests for LlamaIndex adapter",
    "agno: Tests for Agno adapter",
    "hatchet: Tests for Hatchet adapter",
    "mcp: Tests for MCP server functionality",
    "chaos: Chaos and failure-injection tests",
    "requires_network: Tests requiring network access",
    "requires_auth: Tests requiring authentication credentials",
]
timeout = "300"  # 5 minutes default
timeout_method = "thread"

# Coverage configuration
[tool.coverage.run]
source = ["mahavishnu"]
omit = [
    "*/tests/*",
    "*/test_*.py",
    "*/__pycache__/*",
    "*/site-packages/*",
]

[tool.coverage.report]
precision = 2
exclude_lines = [
    "pragma: no cover",
    "def __repr__",
    "raise AssertionError",
    "raise NotImplementedError",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
    "@abstractmethod",
]

# Bandit configuration
[tool.bandit]
exclude_dirs = [".venv", "tests", "test_*.py"]
skips = ["B101"]  # Skip assert_used warnings

# Pyright configuration (type checking fallback)
[tool.pyright]
include = ["mahavishnu"]
exclude = ["**/test*", "**/__pycache__"]
reportMissingImports = "error"
reportMissingTypeStubs = "warning"
pythonVersion = "3.13"
typeCheckingMode = "strict"

# Pylint configuration
[tool.pylint.messages_control]
disable = [
    "C0111",  # missing-docstring
    "C0103",  # invalid-name
    "R0903",  # too-few-public-methods
]

[tool.pylint.format]
max-line-length = 100

# Creosote configuration (detect unused dependencies) — v3.x API
[tool.creosote]
paths = ["mahavishnu"]
sections = ["project.dependencies", "project.optional-dependencies"]
# Exclude packages used outside mahavishnu/ (monitoring/, tests/), CLI tools,
# optional-feature packages, and packages with non-matching import names.
exclude_deps = [
    # Packages imported in monitoring/ (outside mahavishnu/ scan path)
    "prometheus-client",
    "opentelemetry-api",
    "opentelemetry-sdk",
    "opentelemetry-instrumentation",
    "opentelemetry-exporter-otlp-proto-grpc",
    # Packages used as CLI servers/runners (not directly imported)
    "uvicorn",
    # Packages with conditional/optional import patterns
    "slowapi",
    "starlette-context",
    "fastembed",
    "pgvector",
    "tomli",
    "defusedxml",
    "croniter",
    # Packages imported via different names (package name ≠ import name)
    "beautifulsoup4",    # → bs4
    "gitpython",         # → git
    "opencv-python",     # → cv2
    "pydantic-ai-slim",  # → pydantic_ai
    # Optional automation features (platform-conditional imports)
    "Pillow",
    "mss",
    "pyatomac",
    "pyxa",
    "pyautogui",
    "pytesseract",
    "easyocr",
    # Optional content ingestion features
    "pypdf",
    "ebooklib",
    # Optional AI adapter features
    "llama-cpp-python",
    "hatchet-sdk",
    "runpod-flash",
    # Optional dependencies (pydantic-ai, agno)
    "agno",
    # Dev/QC tools (not imported in source, used as CLI tools)
    "bandit",
    "complexipy",
    "codespell",
    "crackerjack",
    "creosote",
    "detect-secrets",
    "hypothesis",
    "pylint",
    "pyright",
    "refurb",
    "ruff",
    "safety",
    "zensical",
    # Test packages
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "pytest-mock",
    "pytest-timeout",
    "pytest-xdist",
    "respx",
]

# Refurb configuration (modern Python suggestions)
[tool.refurb]
enable_all = false
ignore = [
    "FURB101",  # Pathlib usage
    "FURB102",  # startswith tuple — style preference
    "FURB103",  # Print usage
    "FURB105",  # print("") → print() — style preference
    "FURB107",  # use suppress() — same as SIM105 suppressed in ruff
    "FURB108",  # x == a or x == b → x in (a, b) — readability judgment
    "FURB109",  # in [x, y] → in (x, y) — style preference
    "FURB110",  # x if x else None → x or None — suppressed for clarity
    "FURB111",  # lambda: x → x — style preference
    "FURB113",  # consecutive appends → extend — readability judgment
    "FURB115",  # len(x) > 0 → x — style preference
    "FURB117",  # open(path) → path.open() — style preference
    "FURB118",  # lambda a, b: a > b → operator.gt — style preference
    "FURB119",  # {str(e)} → {e} — style preference
    "FURB123",  # dict(x) → x.copy() — style preference
    "FURB124",  # x is y and y is z — style preference
    "FURB126",  # remove unnecessary else: return — readability judgment
    "FURB135",  # unused dict key in for-loop — readability judgment
    "FURB138",  # list comprehension — readability judgment
    "FURB140",  # list(starmap(f, x)) — style preference
    "FURB141",  # os.path.exists → Path.exists() — style preference
    "FURB142",  # for loop set add → update — style preference
    "FURB143",  # x or default — style preference
    "FURB145",  # list copy — style preference
    "FURB148",  # unused enumerate index — style preference
    "FURB154",  # global x; global y → global x, y — style preference
    "FURB157",  # Decimal("0") → Decimal(0) — style preference
    "FURB160",  # redundant self-assignment — suppressed for explicit intent
    "FURB165",  # Path().home() → Path.home() — style preference
    "FURB173",  # dict merge with | — py3.9+ only, compatibility
    "FURB183",  # f"{x}" → str(x) — style preference
    "FURB184",  # chain assignment — readability judgment
]

# pip-audit configuration (vulnerability scanning)
[tool.pip-audit]
# CVE-2025-69872: diskcache race condition — no fix version available as of 2026-05
ignore-vuln = ["CVE-2025-69872"]

# Codespell configuration (typo detection)
[tool.codespell]
ignore-words-list = ["assertIn", "import", "ttest", "ned"]
skip = '.git,*.egg-info,*cache,.venv,build,dist,htmlcov'

# Complexipy configuration (complexity checking)
[tool.complexipy]
max_complexity = 15
ignore = ["tests"]# Zensical configuration (documentation generator)
[tool.zensical]
site_name = "Mahavishnu Documentation"
source_dir = "docs/src"
output_dir = "docs/dist"
theme = "default"
markdown_extensions = [
    "extra",
    "codehilite",
    "toc(permalink=true)",
]
plugins = [
    "search",
]
nav = [
    "index.md",
    "installation.md",
    "configuration.md",
    "usage.md",
    "adapters/index.md",
    "adapters/langgraph.md",
    "adapters/prefect.md",
    "adapters/agno.md",
    "mcp-server.md",
    "security.md",
    "production.md",
    "api-reference.md",
    "troubleshooting.md",
]

[dependency-groups]
dev = [
    "akosha>=0.2.0",
    "crackerjack>=0.50.1",
    "dhara>=0.7.0",
    "iterm2>=2.13",
    "session-buddy>=0.13.0",
]

[tool.uv.sources]
session-buddy = { path = "../session-buddy", editable = true }
