name: Ecosystem Contract Tests

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
    paths:
      - "mahavishnu/**"
      - "tests/integration/test_ecosystem_contracts.py"
      - "scripts/validation/generate_ecosystem_contract_report.py"
      - ".github/workflows/ecosystem-contract-tests.yml"
  pull_request:
    branches: [main, develop]
    paths:
      - "mahavishnu/**"
      - "tests/integration/test_ecosystem_contracts.py"
      - "scripts/validation/generate_ecosystem_contract_report.py"
      - ".github/workflows/ecosystem-contract-tests.yml"

jobs:
  contract-tests:
    name: Ecosystem Contract Tests
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run contract tests
        run: |
          pytest tests/integration/test_ecosystem_contracts.py -q --no-cov

      - name: Generate compatibility report artifact
        run: |
          python scripts/validation/generate_ecosystem_contract_report.py \
            --output artifacts/ecosystem-contract-report.json

      - name: Upload compatibility report artifact
        uses: actions/upload-artifact@v4
        with:
          name: ecosystem-contract-report
          path: |
            artifacts/ecosystem-contract-report.json
            artifacts/ecosystem-contract-report.md
          retention-days: 14
