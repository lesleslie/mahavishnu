[mypy]
python_version = 3.13
warn_return_any = True
warn_unused_configs = True
check_untyped_defs = True
namespace_packages = True
explicit_package_bases = True
ignore_missing_imports = True

# Third-party packages without type stubs
[mypy-oneiric.*]
ignore_missing_imports = True

[mypy-asyncpg]
ignore_missing_imports = True

[mypy-asyncpg.*]
ignore_missing_imports = True

