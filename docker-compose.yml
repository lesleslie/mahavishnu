# Docker Compose for Mahavishnu local development
#
# Services:
# - postgres: PostgreSQL 15+ with pgvector extension
# - redis: Redis for caching (optional)
# - backup: PostgreSQL backup service (optional)
#
# Usage:
#   docker-compose up -d
#   docker-compose down
#   docker-compose logs -f postgres
#
# Security Notes:
# - Redis AUTH is disabled by default for local dev (enable in production)
# - TLS is disabled by default (enable in production)
# - Resource limits are configured for development (increase for production)

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: mahavishnu-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mahavishnu
      POSTGRES_PASSWORD: mahavishnu_dev
      POSTGRES_DB: mahavishnu
      # Performance tuning for development
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mahavishnu -d mahavishnu"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    # Resource limits (adjust for production)
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 8G
        reservations:
          cpus: '2'
          memory: 4G
    command: >
      postgres
      -c max_connections=100
      -c shared_buffers=256MB
      -c effective_cache_size=1GB
      -c maintenance_work_mem=64MB
      -c checkpoint_completion_target=0.9
      -c wal_buffers=16MB
      -c default_statistics_target=100
      -c random_page_cost=1.1
      -c effective_io_concurrency=200
      -c work_mem=262kB
      -c min_wal_size=1GB
      -c max_wal_size=4GB
      # Enable pgvector
      -c shared_preload_libraries='vector'

  # Redis for embedding cache and session storage
  redis:
    image: redis:7-alpine
    container_name: mahavishnu-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits (adjust for production)
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '1'
          memory: 2G
    # Redis configuration with security options
    # For production: enable AUTH and TLS
    command: >
      redis-server
      --appendonly yes
      --maxmemory 3gb
      --maxmemory-policy allkeys-lru
      # Enable AUTH in production (uncomment and set strong password)
      # --requirepass ${REDIS_PASSWORD:-}
      # Enable TLS in production
      # --tls-port 6379
      # --tls-cert-file /etc/redis/tls/redis.crt
      # --tls-key-file /etc/redis/tls/redis.key
      # --tls-ca-cert-file /etc/redis/tls/ca.crt

  # Optional: PostgreSQL backup service
  # Uncomment to enable automated daily backups
  # backup:
  #   image: prodrigestivill/postgres-backup-local
  #   container_name: mahavishnu-backup
  #   restart: unless-stopped
  #   environment:
  #     POSTGRES_HOST: postgres
  #     POSTGRES_DB: mahavishnu
  #     POSTGRES_USER: mahavishnu
  #     POSTGRES_PASSWORD: mahavishnu_dev
  #     SCHEDULE: "@daily"
  #     BACKUP_KEEP_DAYS: 30
  #     BACKUP_KEEP_WEEKS: 4
  #     BACKUP_KEEP_MONTHS: 6
  #   volumes:
  #     - ./backups:/backups
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  # Optional: Adminer for database management UI
  adminer:
    image: adminer:latest
    container_name: mahavishnu-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres
      ADMINER_DESIGN: pepa-linha-dark
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  default:
    name: mahavishnu-network
